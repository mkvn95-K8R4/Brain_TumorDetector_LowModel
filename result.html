<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#43cea2,#185a9d);
}

.container{
  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  width:90%;
  max-width:450px;
}

h2{
  margin-bottom:20px;
}

.success{
  color:green;
  font-weight:600;
}

.error{
  color:red;
  font-weight:600;
}

p{
  margin-top:10px;
  color:#555;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#185a9d;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#14487a;
}
</style>
</head>

<body>

<div class="container">
  <h2>Analysis Result</h2>

  {% if result == "No Tumor" %}
    <h3 class="success">You are healthy 😊</h3>
  {% else %}
    <h3 class="error">Tumor Detected: {{result}}</h3>
    <p>It is recommended to consult a neurologist or neurosurgeon for further diagnosis.</p>
  {% endif %}

  <form action="/">
    <button type="submit">Analyze Another Image</button>
  </form>
</div>

</body>
</html>
